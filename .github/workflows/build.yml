name: Florida

on:
  schedule:
    - cron: "0 9/12 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "ci"]
    paths:
      - ".github/workflows/build.yml"
      - "patches/**"

jobs: 
  check_versions:
    runs-on: ubuntu-22.04

    outputs:
      matrix: ${{ steps.get-versions.outputs.matrix }}
    steps:
      - name: Get latest Frida versions for major releases (15, 16, 17)
        id: get-versions
        uses: actions/github-script@v3
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const majorVersions = [15, 16, 17];
            const versions = [];

            // Use Tags API (lightweight) instead of Releases API (heavy, causes 504)
            // For each major version, scan tags to find the latest semver tag
            for (const major of majorVersions) {
              let found = false;
              for (let page = 1; page <= 10 && !found; page++) {
                const { data: tags } = await github.repos.listTags({
                  owner: 'frida',
                  repo: 'frida',
                  per_page: 100,
                  page: page
                });
                if (tags.length === 0) break;

                // Tags are returned newest-first, find first matching major version
                const match = tags.find(t => {
                  const name = t.name;
                  return name.match(new RegExp(`^${major}\\.\\d+\\.\\d+$`));
                });
                if (match) {
                  versions.push(match.name);
                  core.info(`Found v${major}.x latest: ${match.name}`);
                  found = true;
                }
              }
              if (!found) {
                core.warning(`No tag found for major version ${major}`);
              }
            }

            // Check which versions need building
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const isManualOrPush = context.eventName === 'push' || context.eventName === 'workflow_dispatch';
            const toBuild = [];

            for (const ver of versions) {
              try {
                const existing = await github.repos.getReleaseByTag({ owner, repo, tag: ver });
                if (isManualOrPush) {
                  // Delete existing release for forced rebuild
                  await github.repos.deleteRelease({ owner, repo, release_id: existing.data.id });
                  try {
                    await github.git.deleteRef({ owner, repo, ref: `tags/${ver}` });
                  } catch (e) { /* tag may already be gone */ }
                  toBuild.push(ver);
                  core.info(`Force rebuild: ${ver} (existing release deleted)`);
                } else {
                  core.info(`Skipping ${ver}: already released`);
                }
              } catch (e) {
                if (e.message === 'Not Found') {
                  toBuild.push(ver);
                  core.info(`New version to build: ${ver}`);
                } else {
                  core.setFailed(`Error checking version ${ver}: ${e.message}`);
                }
              }
            }

            if (toBuild.length === 0) {
              core.info('No versions to build');
              core.setOutput('matrix', '{"include":[]}');
            } else {
              const matrix = { include: toBuild.map(v => ({ frida_version: v })) };
              core.setOutput('matrix', JSON.stringify(matrix));
              core.info(`Build matrix: ${JSON.stringify(matrix)}`);
            }

  create_releases:
    needs: check_versions
    runs-on: ubuntu-22.04
    if: ${{ needs.check_versions.outputs.matrix != '{"include":[]}' }}

    strategy:
      matrix: ${{ fromJson(needs.check_versions.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: softprops/action-gh-release@v2.1.0
        id: createRelease
        name: Create Release for ${{ matrix.frida_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "${{ matrix.frida_version }}"
          name: "${{ matrix.frida_version }}"
          prerelease: false

  android_build:
    runs-on: ubuntu-22.04
    needs: [check_versions, create_releases]

    strategy:
      matrix: ${{ fromJson(needs.check_versions.outputs.matrix) }}
      fail-fast: false

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        local-cache: false
        link-to-sdk: true

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: 3.9

    - name: install dependencies
      run: |
        sudo apt-get update && DEBIAN_FRONTEND=noninteractive sudo apt-get install build-essential tree ninja-build gcc-multilib g++-multilib lib32stdc++-9-dev flex bison ruby ruby-dev python3-requests python3-setuptools python3-dev python3-pip libc6-dev libc6-dev-i386 -y
        sudo gem install fpm -v 1.11.0 --no-document
        python3 -m pip install lief graphlib

    - name: build frida ${{ matrix.frida_version }} for Android
      shell: bash
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
        export FRIDA_VERSION=${{ matrix.frida_version }}
        WORKSPACE=$(pwd)
        echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"
        echo "FRIDA_VERSION=$FRIDA_VERSION"
        echo "WORKSPACE=$WORKSPACE"
        
        git clone --recurse-submodules --branch "$FRIDA_VERSION" --depth 1 https://github.com/frida/frida
        cd frida
        
        # Detect directory structure: v16+ uses subprojects/, v15 uses root-level
        if [ -d "subprojects/frida-core" ]; then
          SUBDIR="subprojects"
          echo "Detected subprojects/ layout (v16+)"
        else
          SUBDIR="."
          echo "Detected root-level layout (v15)"
        fi
        
        # Apply patches using absolute paths (works for any layout depth)
        for path in $WORKSPACE/patches/*
        do
          name=$(basename $path)
          target_dir="$SUBDIR/$name"
          if [ -d "$target_dir" ]; then
            echo "Apply patches to frida/$target_dir"
            cd "$target_dir"
            git am --3way $WORKSPACE/patches/$name/*.patch || echo "WARNING: Patch failed for $name on version $FRIDA_VERSION, skipping..."
            cd - > /dev/null
            echo "Done patching $name"
          else
            echo "SKIP: $target_dir not found, skipping patches for $name"
          fi
        done
        cd $WORKSPACE
        
        ARCHES="android-arm android-arm64 android-x86 android-x86_64"
        
        # Detect build system: v16+ has configure script, v15 uses Makefile
        if [ -f "frida/configure" ]; then
          echo "=== Using configure + make (v16+) ==="
          for ARCH in $ARCHES
          do
            mkdir build-$ARCH
            cd build-$ARCH
            ../frida/configure --host=$ARCH
            make
            cd ..
          done
        else
          echo "=== Using Makefile (v15) ==="
          cd frida
          for ARCH in $ARCHES
          do
            echo "Building frida-server for $ARCH..."
            make server-$ARCH || make core-$ARCH || echo "WARNING: server build failed for $ARCH"
            echo "Building frida-inject for $ARCH..."
            make inject-$ARCH || true
            echo "Building frida-gadget for $ARCH..."
            make gadget-$ARCH || true
          done
          cd ..
        fi
    
    - name: Split Repository Name
      id: split_name
      run: |
        repo_name=${{ github.repository }}
        IFS='/' read -ra repo_parts <<< "$repo_name"
        echo "owner=${repo_parts[0]}" >> $GITHUB_OUTPUT
        echo "repo=${repo_parts[1]}" >> $GITHUB_OUTPUT

    - name: Check release version
      id: checkReleaseVersion
      uses: actions/github-script@v3
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          try {
            const releaseVersion = '${{ matrix.frida_version }}'
            const releaseResponse = await github.repos.getReleaseByTag({
              owner: '${{ steps.split_name.outputs.owner }}',
              repo: '${{ steps.split_name.outputs.repo }}',
              tag: releaseVersion
            })
            const {
              data: { id: releaseId, html_url: htmlUrl, upload_url: uploadUrl }
            } = releaseResponse;
            core.setOutput('id', releaseId);
            core.setOutput('html_url', htmlUrl);
            core.setOutput('upload_url', uploadUrl);
            core.setOutput('version', releaseVersion);
          } catch (e) {
            core.setFailed(e.message);
          }

    - name: package build result for Android
      shell: bash
      run: |
        # Normalize output: find artifacts in either location and copy to consistent out/ directory
        # v16+ puts artifacts in build-$ARCH/, v15 puts them in frida/build/
        ARCHES="android-arm android-arm64 android-x86 android-x86_64"
        
        echo "=== Searching for build artifacts ==="
        find . -name "frida-server" -type f 2>/dev/null || echo "No frida-server found"
        find . -name "frida-inject" -type f 2>/dev/null || echo "No frida-inject found"
        find . -name "frida-gadget.so" -type f 2>/dev/null || echo "No frida-gadget.so found"
        find . -name "libfrida-gumjs-1.0.a" -type f 2>/dev/null || echo "No libfrida-gumjs found"
        
        for ARCH in $ARCHES
        do
          mkdir -p out/$ARCH
          
          # Search both possible build output locations
          SEARCH_DIRS=""
          if [ -d "build-$ARCH" ]; then SEARCH_DIRS="$SEARCH_DIRS build-$ARCH"; fi
          if [ -d "frida/build" ]; then SEARCH_DIRS="$SEARCH_DIRS frida/build"; fi
          if [ -z "$SEARCH_DIRS" ]; then
            echo "WARNING: No build directories found for $ARCH"
            continue
          fi
          
          # Find and copy artifacts (grep ARCH to match correct architecture)
          SERVER=$(find $SEARCH_DIRS -name "frida-server" -type f 2>/dev/null | grep -i "$ARCH\|$(echo $ARCH | sed 's/android-//')" | head -1)
          if [ -z "$SERVER" ]; then SERVER=$(find $SEARCH_DIRS -name "frida-server" -type f 2>/dev/null | head -1); fi
          if [ -n "$SERVER" ]; then cp "$SERVER" out/$ARCH/frida-server; echo "  server: $SERVER"; fi
          
          INJECT=$(find $SEARCH_DIRS -name "frida-inject" -type f 2>/dev/null | grep -i "$ARCH\|$(echo $ARCH | sed 's/android-//')" | head -1)
          if [ -z "$INJECT" ]; then INJECT=$(find $SEARCH_DIRS -name "frida-inject" -type f 2>/dev/null | head -1); fi
          if [ -n "$INJECT" ]; then cp "$INJECT" out/$ARCH/frida-inject; echo "  inject: $INJECT"; fi
          
          GADGET=$(find $SEARCH_DIRS -name "frida-gadget.so" -type f 2>/dev/null | grep -i "$ARCH\|$(echo $ARCH | sed 's/android-//')" | head -1)
          if [ -z "$GADGET" ]; then GADGET=$(find $SEARCH_DIRS -name "frida-gadget.so" -type f 2>/dev/null | head -1); fi
          if [ -n "$GADGET" ]; then cp "$GADGET" out/$ARCH/frida-gadget.so; echo "  gadget: $GADGET"; fi
          
          GUMJS=$(find $SEARCH_DIRS -name "libfrida-gumjs-1.0.a" -type f 2>/dev/null | grep -i "$ARCH\|$(echo $ARCH | sed 's/android-//')" | head -1)
          if [ -z "$GUMJS" ]; then GUMJS=$(find $SEARCH_DIRS -name "libfrida-gumjs-1.0.a" -type f 2>/dev/null | head -1); fi
          if [ -n "$GUMJS" ]; then cp "$GUMJS" out/$ARCH/libfrida-gumjs-1.0.a; echo "  gumjs: $GUMJS"; fi
          
          # Gzip all found artifacts
          for f in out/$ARCH/*; do
            if [ -f "$f" ]; then gzip "$f"; fi
          done
          
          echo "Packaged $ARCH: $(ls out/$ARCH/ 2>/dev/null || echo 'EMPTY')"
        done
        

    - name: Upload android arm frida-server for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-arm/frida-server.gz'
        asset_name: 'florida-server-${{ matrix.frida_version }}-android-arm.gz'
        asset_content_type: application/octet-stream

    - name: Upload android arm64 frida-server for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-arm64/frida-server.gz'
        asset_name: 'florida-server-${{ matrix.frida_version }}-android-arm64.gz'
        asset_content_type: application/octet-stream

    - name: Upload android x86 frida-server for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-x86/frida-server.gz'
        asset_name: 'florida-server-${{ matrix.frida_version }}-android-x86.gz'
        asset_content_type: application/octet-stream

    - name: Upload android x86_64 frida-server for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-x86_64/frida-server.gz'
        asset_name: 'florida-server-${{ matrix.frida_version }}-android-x86_64.gz'
        asset_content_type: application/octet-stream
        
    - name: Upload android arm frida-inject for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-arm/frida-inject.gz'
        asset_name: 'florida-inject-${{ matrix.frida_version }}-android-arm.gz'
        asset_content_type: application/octet-stream
        
    - name: Upload android arm64 frida-inject for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-arm64/frida-inject.gz'
        asset_name: 'florida-inject-${{ matrix.frida_version }}-android-arm64.gz'
        asset_content_type: application/octet-stream
        
    - name: Upload android x86 frida-inject for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-x86/frida-inject.gz'
        asset_name: 'florida-inject-${{ matrix.frida_version }}-android-x86.gz'
        asset_content_type: application/octet-stream
        
    - name: Upload android x86_64 frida-inject for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-x86_64/frida-inject.gz'
        asset_name: 'florida-inject-${{ matrix.frida_version }}-android-x86_64.gz'
        asset_content_type: application/octet-stream
    
    - name: Upload android arm frida-gadget for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-arm/frida-gadget.so.gz'
        asset_name: 'florida-gadget-${{ matrix.frida_version }}-android-arm.so.gz'
        asset_content_type: application/octet-stream

    - name: Upload android arm64 frida-gadget for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-arm64/frida-gadget.so.gz'
        asset_name: 'florida-gadget-${{ matrix.frida_version }}-android-arm64.so.gz'
        asset_content_type: application/octet-stream
   
    - name: Upload android x86 frida-gadget for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-x86/frida-gadget.so.gz'
        asset_name: 'florida-gadget-${{ matrix.frida_version }}-android-x86.so.gz'
        asset_content_type: application/octet-stream

    - name: Upload android x86_64 frida-gadget for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-x86_64/frida-gadget.so.gz'
        asset_name: 'florida-gadget-${{ matrix.frida_version }}-android-x86_64.so.gz'
        asset_content_type: application/octet-stream
     
    - name: Upload android arm frida-gumjs for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-arm/libfrida-gumjs-1.0.a.gz'
        asset_name: 'florida-gumjs-${{ matrix.frida_version }}-android-arm.a.gz'
        asset_content_type: application/octet-stream

    - name: Upload android arm64 frida-gumjs for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-arm64/libfrida-gumjs-1.0.a.gz'
        asset_name: 'florida-gumjs-${{ matrix.frida_version }}-android-arm64.a.gz'
        asset_content_type: application/octet-stream
   
    - name: Upload android x86 frida-gumjs for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-x86/libfrida-gumjs-1.0.a.gz'
        asset_name: 'florida-gumjs-${{ matrix.frida_version }}-android-x86.a.gz'
        asset_content_type: application/octet-stream

    - name: Upload android x86_64 frida-gumjs for Florida
      uses: actions/upload-release-asset@v1.0.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: '${{ steps.checkReleaseVersion.outputs.upload_url }}'
        asset_path: '${{ github.workspace }}/out/android-x86_64/libfrida-gumjs-1.0.a.gz'
        asset_name: 'florida-gumjs-${{ matrix.frida_version }}-android-x86_64.a.gz'
        asset_content_type: application/octet-stream
